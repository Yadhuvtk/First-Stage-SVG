# Potrace-style pipeline default parameters
# Referenced by tracer.py and scripts/trace.py
#
# Stage mapping:
#  threshold  -> binary binarization cutoff (Stage 0: preprocessing)
#  turdsize   -> min path area kept         (Stage 1: bm_to_pathlist)
#  alphamax   -> corner sharpness threshold (Stage 6: smooth)
#  opttol     -> curve-merge tolerance      (Stage 7: opti_curve)
#  optcurve   -> enable/disable Stage 7

preprocessing:
  threshold: 128        # 0-255; ignored when --otsu is used
  otsu: false           # OTSU auto-threshold (recommended for photos)
  invert: false         # flip foreground/background
  close: 0              # morphological close kernel size in pixels

pipeline:
  turdsize: 2           # suppress speckles <= this area (px^2)
  alphamax: 1.0         # corner threshold: 0=all corners, 4=all curves
  opttolerance: 0.2     # curve-merge tolerance in pixels
  optcurve: true        # enable optiCurve merging pass (Stage 7)
  turnpolicy: minority  # minority|majority|right|black|white
  tension: 0.55         # bezier control-arm scale factor (higher = smoother, fuller curves)
  # yd_vector bezier-fitting parameters:
  corner_threshold: 0.85       # dot-product cosine cutoff for corner detection
                               # (1.0=no corners, 0.0=90° only, -1.0=every vertex)
  simplify_epsilon: 1.5        # Douglas-Peucker tolerance before Bézier fitting (px)
  bezier_min_points: 3         # minimum segment length to use a cubic Bezier (C cmd)
                               # shorter segments fall back to straight lines (L cmd)
  corner_arc_radius_sharp: 0.42  # arc radius for sharp corners (dot product < 0.5)
  corner_arc_radius_soft: 0.92   # arc radius for soft corners  (dot product 0.5–0.85)

output:
  fill: "#000000"       # foreground fill color
  bg: null              # background rect color (null = transparent SVG)
  scale: 1.0            # output scale factor

preprocess:
  preprocess_enabled: false  # enable ML pre-processing (Real-ESRGAN + SAM 2.1)
  upscale_scale: 4           # Real-ESRGAN upscale factor (4 = x4plus model)
  sam_model: sam2_hiera_large
  sam_points_per_side: 64    # SAM2 grid density (higher = more masks, slower)
  sam_iou_thresh: 0.90       # SAM2 predicted IoU threshold
  color_merge_threshold: 12  # LAB distance below which masks are merged
  n_colors: 8                # max colour layers to keep after merging
